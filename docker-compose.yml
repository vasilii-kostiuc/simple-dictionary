networks:
  simple_dictionary_network:
    driver: bridge
    name: simple_dictionary_network
services:
  nginx:
    image: nginx:latest
    volumes:
      - ./:/var/www/simple_dictionary_api
      - ./_docker/nginx/conf.d/app.local.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8876:80"
    depends_on:
      - app
    container_name: project_nginx
    networks:
      - simple_dictionary_network
  app:
    build:
      context: .
      dockerfile: _docker/app/Dockerfile.dev
    volumes:
      - ./:/var/www/simple_dictionary_api
    depends_on:
      - db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    container_name: app
    networks:
      - simple_dictionary_network
  db:
    image: mysql:8.1
    restart: always
    volumes:
      - ./tmp/db:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - 8101:3306
    container_name: db
    networks:
      - simple_dictionary_network
